<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#g)"/>
  <!-- Recipe / gear merge -->
  <g fill="white" transform="translate(32 32)">
    <!-- gear -->
    <g>
      <circle r="13" fill="none" stroke="white" stroke-width="3"/>
      <circle r="5" fill="white"/>
    </g>
    <!-- teeth -->
    <g>
      <rect x="-2.5" y="-20" width="5" height="6" fill="white"/>
      <rect x="-2.5" y="14" width="5" height="6" fill="white"/>
      <rect x="-20" y="-2.5" width="6" height="5" fill="white"/>
      <rect x="14" y="-2.5" width="6" height="5" fill="white"/>
      <rect x="-2.5" y="-20" width="5" height="6" fill="white" transform="rotate(45)"/>
      <rect x="-2.5" y="14" width="5" height="6" fill="white" transform="rotate(45)"/>
      <rect x="-20" y="-2.5" width="6" height="5" fill="white" transform="rotate(45)"/>
      <rect x="14" y="-2.5" width="6" height="5" fill="white" transform="rotate(45)"/>
    </g>
  </g>
</svg>
